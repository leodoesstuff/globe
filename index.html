<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Palantir Live Globe</title>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three-globe"></script>

<style>
body {
  margin: 0;
  background: #05070d;
  font-family: monospace;
  color: #00f0ff;
  overflow: hidden;
}
.topbar {
  position: absolute;
  top: 0;
  width: 100%;
  height: 40px;
  border-bottom: 1px solid #00f0ff;
  display: flex;
  align-items: center;
  padding-left: 20px;
  background: rgba(0,0,0,0.5);
}
.panel {
  position: absolute;
  top: 60px;
  left: 20px;
  width: 260px;
  background: rgba(0, 0, 0, 0.6);
  border: 1px solid #00f0ff;
  padding: 15px;
}
.panel-right {
  right: 20px;
  left: auto;
}
#infoPanel {
  bottom: 20px;
  top: auto;
  display: none;
}
.alert {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: red;
  display: none;
}
</style>
</head>

<body>

<div class="topbar">GLOBAL INTELLIGENCE SYSTEM</div>

<div class="panel">
  <h3>STATUS</h3>
  <p id="flightCount">Flights: loading...</p>
  <p id="quakeCount">Quakes: loading...</p>
</div>

<div class="panel panel-right">
  <h3>LIVE</h3>
  <p>System: ONLINE</p>
</div>

<div class="panel" id="infoPanel"></div>
<div class="alert" id="alertBox">⚠️ HIGH ACTIVITY DETECTED</div>

<script>

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 300;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const globe = new ThreeGlobe()
  .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg");

scene.add(globe);
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

let flights = [];
let quakes = [];

async function loadFlights() {
  try {
    const res = await fetch("https://corsproxy.io/?https://opensky-network.org/api/states/all");
    const data = await res.json();

    flights = data.states
      .filter(p => p[5] && p[6])
      .slice(0, 150)
      .map(p => ({
        type: "flight",
        lat: p[6],
        lng: p[5],
        velocity: p[9] || 0
      }));

    updateGlobe();
    document.getElementById("flightCount").innerText = "Flights: " + flights.length;
  } catch {
    console.log("Flight API blocked");
  }
}

async function loadQuakes() {
  const res = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
  const data = await res.json();

  quakes = data.features.map(q => ({
    type: "quake",
    lat: q.geometry.coordinates[1],
    lng: q.geometry.coordinates[0],
    mag: q.properties.mag
  }));

  updateGlobe();
  document.getElementById("quakeCount").innerText = "Quakes: " + quakes.length;

  if (quakes.some(q => q.mag > 5)) {
    document.getElementById("alertBox").style.display = "block";
  }
}

function updateGlobe() {
  const combined = [...flights, ...quakes];

  globe
    .pointsData(combined)
    .pointColor(d => d.type === "quake" ? "#ff4444" : "#00ff88")
    .pointRadius(d => d.type === "quake" ? d.mag * 0.2 : 0.25)
    .onPointClick(showInfo);
}

function showInfo(d) {
  const panel = document.getElementById("infoPanel");
  panel.style.display = "block";

  if (d.type === "flight") {
    panel.innerHTML = `
      <h3>✈️ Aircraft</h3>
      <p>Lat: ${d.lat.toFixed(2)}</p>
      <p>Lng: ${d.lng.toFixed(2)}</p>
      <p>Speed: ${Math.round(d.velocity)} m/s</p>
    `;
  } else {
    panel.innerHTML = `
      <h3>🌎 Earthquake</h3>
      <p>Magnitude: ${d.mag}</p>
      <p>Lat: ${d.lat.toFixed(2)}</p>
      <p>Lng: ${d.lng.toFixed(2)}</p>
    `;
  }
}

setInterval(loadFlights, 10000);
setInterval(loadQuakes, 15000);

loadFlights();
loadQuakes();

function animate() {
  requestAnimationFrame(animate);
  globe.rotation.y += 0.0015;
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
